<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Movie Explorer</title>
    <link rel="icon" href="https://movie-posters-bucket-aws.s3.us-east-1.amazonaws.com/logo1.png" />
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
        }

        header {
            padding: 20px;
            text-align: center;
            background: #000;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .logo {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }

        input {
            padding: 10px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 10px 15px;
            margin-left: 10px;
            background: red;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .movie-info {
            text-align: center;
            margin: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            justify-items: center;
        }

        .card {
            background: #222;
            padding: 10px;
            border-radius: 12px;
            text-align: center;
            width: 220px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 10px;
        }

        @media (max-width: 900px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 500px) {
            .grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>

<body>

<header>
    <div class="header">
        <img src="https://movie-posters-bucket-aws.s3.us-east-1.amazonaws.com/logo.png" alt="logo" class="logo">
        <h1>Movie Explorer</h1>
    </div>
    <input type="text" id="movieName" placeholder="Search movie...">
    <button onclick="searchMovie()">Search</button>
</header>

<div class="movie-info" id="details">
    <h2>Search for a movie</h2>
    <p>Enter a movie name to see details and posters</p>
</div>

<div class="grid" id="posters"></div>

<script>
async function searchMovie() {
    const movieName = document.getElementById('movieName').value.trim();

    if (!movieName) {
        alert("Please enter a movie name");
        return;
    }

    const detailsDiv = document.getElementById('details');
    const postersDiv = document.getElementById('posters');

    // Show loading state
    detailsDiv.innerHTML = "<h2>Loading...</h2>";
    postersDiv.innerHTML = "";

    try {
        const response = await fetch(`/movie?name=${encodeURIComponent(movieName)}`);

        let movie;
        try {
            movie = await response.json();
        } catch {
            throw new Error("Invalid server response");
        }

        // Handle movie not found or server errors
        if (!response.ok || !movie || !movie.title) {
            detailsDiv.innerHTML = `
                <h2>Movie Not Found</h2>
                <p>${movie?.message || "The requested movie is not available."}</p>
            `;
            postersDiv.innerHTML = "";
            return;
        }

        // Display movie details
        detailsDiv.innerHTML = `
            <h2>${movie.title}</h2>
            <p>${movie.description || "No description available."}</p>
            <p>🎬 <strong>Director:</strong> ${movie.director || "N/A"}</p>
            <p>🎭 <strong>Cast:</strong> ${movie.cast || "N/A"}</p>
            <p>🏷️ <strong>Genre:</strong> ${movie.genre || "N/A"}</p>
            <p>⏱️ <strong>Duration:</strong> ${movie.duration || "N/A"}</p>
            <p>📅 <strong>Year:</strong> ${movie.release_year || "N/A"} | ⭐ ${movie.rating || "N/A"}</p>
        `;

        // Display posters
        const posters = Array.isArray(movie.posters) ? movie.posters.slice(0, 4) : [];

        if (posters.length === 0) {
            postersDiv.innerHTML = "<p>No posters available</p>";
            return;
        }

        postersDiv.innerHTML = posters.map(url => `
            <div class="card">
                <img src="${url}" alt="${movie.title} Poster"
                     onerror="this.src='https://via.placeholder.com/220x320?text=No+Image';">
            </div>
        `).join('');

    } catch (error) {
        console.error("Error fetching movie:", error);
        detailsDiv.innerHTML = `
            <h2>Error</h2>
            <p>Unable to fetch movie details. Please try again later.</p>
        `;
        postersDiv.innerHTML = "";
    }
}

// Allow search using the Enter key
document.getElementById('movieName').addEventListener('keypress', function(event) {
    if (event.key === 'Enter') {
        searchMovie();
    }
});
</script>

</body>
</html>
